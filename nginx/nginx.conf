upstream web_upstream {
    server web:3000;
}

upstream backend_upstream {
    server backend:5000;
}

# HTTP -> redirect to HTTPS
server {
    listen 80;
    server_name caffeineoperator.online www.caffeineoperator.online;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl;
    server_name caffeineoperator.online www.caffeineoperator.online;

    ssl_certificate /etc/letsencrypt/live/caffeineoperator.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/caffeineoperator.online/privkey.pem;

    # Proxy headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # API routes -> backend (strips /api/ prefix)
    location /api/ {
        proxy_pass http://backend_upstream/;
        client_max_body_size 10m;
    }

    # Everything else -> Next.js
    location / {
        proxy_pass http://web_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
