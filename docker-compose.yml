services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/coffee-ordering
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      BASE_URL: https://caffeineoperator.online/api
      DASHBOARD_URL: https://caffeineoperator.online/dashboard
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}

  web:
    build: ./web
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      PORT: 3001
      BACKEND_INTERNAL_URL: http://backend:5000

  ssh-server:
    build: ./ssh-server
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "2222:2222"
    environment:
      API_URL: http://backend:5000
      SSH_PORT: 2222
      HOST_KEY_PATH: /app/host-key-data/host.key
    volumes:
      - ssh_host_key:/app/host-key-data

  nginx:
    build: ./nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - web
      - backend
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot

  certbot:
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  mongo_data:
  ssh_host_key:
  certbot_conf:
  certbot_www:
